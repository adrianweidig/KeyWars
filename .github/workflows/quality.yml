name: quality

on:
  pull_request:
  push:
    branches: [master]
  schedule:
    - cron: '41 4 * * 1'

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
        with:
          globs: |
            **/*.md
            !**/bin/**
            !**/obj/**

      - name: YAML lint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3
        with:
          file_or_dir: .github .github/workflows compose.yaml
          config_data: |
            extends: default
            rules:
              line-length:
                max: 140
                level: warning
              truthy:
                allowed-values: ['true', 'false', 'on']

      - name: GitHub Actions lint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1

      - name: Dockerfile lint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Repository hygiene
        shell: bash
        run: |
          test -f LICENSE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f .github/CODEOWNERS
          test -f .github/dependabot.yml
          test -f .editorconfig
          artifacts="$(find . -path ./.git -prune -o -type f \
            \( -name '*.7z' -o -name '*.tar' -o -name '*.tar.gz' -o -name '*.db' -o -name '*.log' \) \
            -print -quit)"
          if [ -n "$artifacts" ]; then
            echo "$artifacts"
            echo "Generated or local artifact files must not be committed."
            exit 1
          fi
