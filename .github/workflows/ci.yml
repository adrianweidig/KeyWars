name: ci

on:
  pull_request:
  push:
    branches: [master]
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore --locked-mode
      - name: Format
        run: dotnet format --verify-no-changes --no-restore
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Test
        run: dotnet test -c Release --no-build --collect:"XPlat Code Coverage" --results-directory TestResults
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install browser test dependencies
        run: npm ci
      - name: Verify Chrome browser
        run: google-chrome --version
      - name: Browser E2E
        env:
          KEYWARS_BROWSER_CHANNEL: chrome
        run: npm run test:browser
      - name: Upload browser artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: output/playwright
          if-no-files-found: ignore
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: TestResults
          if-no-files-found: error
      - name: Docker build smoke
        run: docker build -t keywars:ci .
      - name: Compose config
        run: docker compose --env-file .env.example config
      - name: Runtime asset check
        shell: bash
        run: |
          if grep -RInE --exclude-dir=vendor 'https?://|//cdn|fonts.googleapis|unpkg|jsdelivr' src/KeyWars/Pages src/KeyWars/wwwroot; then
            echo "External runtime asset reference found"
            exit 1
          fi
