name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore --locked-mode
      - name: Format
        run: dotnet format --verify-no-changes --no-restore
      - name: Repository hygiene
        run: python scripts/check_repository_hygiene.py
      - name: Implementation status
        run: python scripts/check_implementation_status.py
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Test
        run: dotnet test -c Release --no-build
      - name: Load test
        run: dotnet run --project tools/KeyWars.LoadTest -c Release --no-build -- 2 10 25 50 100
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/keywars
      - name: Build and push
        id: push-image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
      - name: Build offline amd64 image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: keywars:${{ github.ref_name }}
      - name: Create release notes
        env:
          IMAGE_DIGEST: ${{ steps.push-image.outputs.digest }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p artifacts
          docker save keywars:${{ github.ref_name }} | gzip -c > artifacts/keywars-${{ github.ref_name }}-linux-amd64.tar.gz
          cp compose.yaml .env.example artifacts/
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          tags = [line for line in os.environ["IMAGE_TAGS"].splitlines() if line]
          manifest = {
              "schema_version": 1,
              "version": version,
              "image": {
                  "repository": "ghcr.io/${{ github.repository_owner }}/keywars",
                  "tags": tags,
                  "digest": os.environ["IMAGE_DIGEST"],
                  "sbom": "registry-attached",
                  "provenance": "registry-attached",
              },
              "offline_archives": [
                  {
                      "file": f"keywars-{version}-linux-amd64.tar.gz",
                      "platform": "linux/amd64",
                      "format": "docker-save-tar-gzip",
                  }
              ],
          }
          Path("artifacts/RELEASE_MANIFEST.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY
          (cd artifacts && sha256sum keywars-${{ github.ref_name }}-linux-amd64.tar.gz compose.yaml .env.example RELEASE_MANIFEST.json > SHA256SUMS)
      - name: Verify release artifacts
        run: python scripts/check_release_artifacts.py artifacts "${{ github.ref_name }}"
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          generate_release_notes: true
          files: artifacts/*
