name: performance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  loadtest:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet run --project tools/KeyWars.LoadTest -c Release -- 2 10 25 50 100 | tee keywars-loadtest.txt
      - uses: actions/upload-artifact@v4
        with:
          name: keywars-loadtest
          path: keywars-loadtest.txt
